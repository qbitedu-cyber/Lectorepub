<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <!-- CRÍTICO PARA MÓVILES: 100dvh y user-scalable=no previene que la interfaz se rompa con el zoom del navegador -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Q-BIT | Advanced Reader System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        qbit: {
                            black: '#000000',
                            dark: '#171717',
                            gray: '#262626',
                            white: '#ffffff',
                            light: '#f8fafc',
                            yellow: '#FACC15',
                            cyan: '#06b6d4',
                            blue: '#3b82f6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Space Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- LIBRERÍAS DE LECTURA -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* Layout flex vertical completo compatible con teclados virtuales móviles (dvh) */
        body { 
            @apply font-sans antialiased bg-qbit-light dark:bg-[#0f172a] text-qbit-black dark:text-gray-200 transition-colors duration-300;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Loader Animation */
        .loader-bar {
            width: 6px; height: 24px; background: #FACC15;
            animation: loaderAnim 1s ease-in-out infinite;
            border-radius: 3px;
        }
        .loader-bar:nth-child(2) { animation-delay: 0.15s; background: #06b6d4;}
        .loader-bar:nth-child(3) { animation-delay: 0.3s; background: #3b82f6;}
        @keyframes loaderAnim {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(2); opacity: 1; }
        }

        /* Estilos PDF Canvas (Ajustados para scroll suave en móviles) */
        #pdf-render {
            @apply flex justify-center w-full h-full overflow-auto p-4 sm:px-16 transition-all duration-300;
            -webkit-overflow-scrolling: touch; 
        }
        canvas {
            @apply shadow-2xl max-w-full transition-all duration-300 bg-white rounded-md; 
        }
        
        /* Modo Oscuro en PDF */
        .dark canvas {
            filter: invert(1) hue-rotate(180deg) contrast(0.85) brightness(1.1);
        }
        
        #loader { transition: opacity 0.5s ease-out, visibility 0.5s; }
        #loader.hidden-loader { opacity: 0; visibility: hidden; pointer-events: none; }

        /* Regla de lectura */
        #reading-ruler {
            pointer-events: none; transition: top 0.1s ease-out;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
            border-top: 1px solid rgba(6, 182, 212, 0.8);
            border-bottom: 1px solid rgba(6, 182, 212, 0.8);
            background: rgba(6, 182, 212, 0.15);
        }

        .page-input::-webkit-inner-spin-button, 
        .page-input::-webkit-outer-spin-button { 
            -webkit-appearance: none; margin: 0; 
        }

        /* NOTAS LATERALES (Sidebar optimizada para móviles) */
        #notes-sidebar {
            position: fixed; top: 64px; right: -100%; /* Oculto fuera de la pantalla */
            width: 100%; max-width: 380px; /* 100% en móvil, 380px en desktop */
            height: calc(100dvh - 64px);
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid rgba(250, 204, 21, 0.3);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 45;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #notes-sidebar.active { right: 0; }

        .notes-list-scroll::-webkit-scrollbar { width: 6px; }
        .notes-list-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .notes-list-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        .tool-btn {
            @apply w-9 h-9 flex items-center justify-center rounded-lg text-gray-400 hover:bg-gray-800 hover:text-qbit-cyan transition-colors duration-200 relative;
        }
        .tool-btn.active {
            @apply bg-gray-800 text-qbit-cyan shadow-[0_0_10px_rgba(6,182,212,0.3)];
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- LOADER -->
    <div id="loader" class="fixed inset-0 z-[999] bg-white dark:bg-[#020617] flex flex-col justify-center items-center">
        <div class="flex gap-4 items-center mb-8">
            <div class="loader-bar"></div>
            <div class="loader-bar"></div>
            <div class="loader-bar"></div>
        </div>
        <div class="font-mono text-sm text-gray-500 dark:text-gray-400 uppercase tracking-widest animate-pulse" id="status-msg">
            DECRYPTING DOCUMENT...
        </div>
    </div>

    <!-- READING RULER -->
    <div id="reading-ruler" class="hidden fixed left-0 right-0 h-10 z-30 mix-blend-multiply dark:mix-blend-screen"></div>

    <!-- HEADER BAR -->
    <header class="h-16 shrink-0 bg-[#020617] text-white border-b border-gray-800 flex items-center justify-between px-3 sm:px-4 z-50 shadow-lg relative">
        <div class="flex items-center gap-3 sm:gap-4 flex-1 overflow-hidden">
            <!-- LOGO -->
            <div class="flex items-center gap-2 shrink-0">
                <div class="w-8 h-8 bg-gradient-to-br from-qbit-cyan to-blue-600 flex items-center justify-center rounded text-white shadow-[0_0_10px_rgba(6,182,212,0.5)]">
                    <span class="font-bold text-lg leading-none font-mono">Q</span>
                </div>
                <span class="hidden md:block font-bold tracking-widest text-lg text-white font-mono">Q-BIT</span>
            </div>
            
            <div class="h-6 w-px bg-gray-700 hidden sm:block shrink-0"></div>
            
            <!-- TITULO (Compacto para móviles) -->
            <div class="flex flex-col justify-center min-w-0 shrink">
                <span id="format-tag" class="text-[8px] sm:text-[9px] font-mono bg-gray-800 px-1.5 py-0.5 rounded text-qbit-cyan uppercase tracking-widest w-fit border border-gray-700">READER</span>
                <h1 id="title-display" class="text-xs sm:text-sm font-semibold text-gray-200 truncate max-w-[120px] sm:max-w-xs md:max-w-md">Cargando...</h1>
            </div>

            <!-- CONTADOR DE PAGINAS -->
            <div class="flex items-center bg-gray-900 border border-gray-700 rounded-lg px-2 py-1 gap-1 shrink-0 shadow-inner ml-auto sm:ml-2">
                <span class="text-[10px] font-mono text-gray-500 uppercase hidden sm:inline mr-1">PÁG</span>
                <input type="number" id="page-input" value="1" min="1" class="page-input w-8 sm:w-12 bg-transparent text-center text-sm font-bold text-white focus:outline-none focus:text-qbit-cyan placeholder-gray-600">
                <span class="text-gray-500 text-sm">/</span>
                <span id="total-pages" class="text-gray-400 text-sm font-mono font-bold">--</span>
            </div>
        </div>

        <!-- HERRAMIENTAS DERECHAS -->
        <div class="flex items-center gap-1 sm:gap-2 shrink-0 ml-2">
            <!-- Notas -->
            <button onclick="toggleNotes()" id="btn-notes" title="Bloc de Notas" class="tool-btn">
                <i data-lucide="edit-3" class="w-5 h-5"></i>
            </button>

            <div class="h-4 w-px bg-gray-700 mx-0.5 sm:mx-1"></div>

            <!-- Regla -->
            <button onclick="toggleRuler()" id="btn-ruler" title="Regla de Lectura" class="tool-btn hidden sm:flex">
                <i data-lucide="ruler" class="w-5 h-5"></i>
            </button>

            <!-- Zoom Desktop -->
            <div class="hidden sm:flex items-center bg-gray-900 border border-gray-700 rounded-lg p-0.5">
                <button onclick="zoom(-0.1)" title="Alejar" class="w-8 h-8 flex items-center justify-center hover:bg-gray-800 text-gray-400 hover:text-white rounded transition"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                <div class="w-px h-4 bg-gray-700 mx-0.5"></div>
                <button onclick="zoom(0.1)" title="Acercar" class="w-8 h-8 flex items-center justify-center hover:bg-gray-800 text-gray-400 hover:text-white rounded transition"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
            </div>
            
            <div class="h-4 w-px bg-gray-700 mx-0.5 sm:mx-1"></div>

            <!-- Tema -->
            <button id="themeToggle" title="Cambiar Tema" class="tool-btn">
                <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-qbit-yellow"></i>
            </button>

            <!-- Cerrar -->
            <button onclick="closeReader()" title="Cerrar Lector" class="w-9 h-9 flex items-center justify-center rounded-lg bg-red-950/30 text-red-500 border border-red-900/50 hover:bg-red-600 hover:text-white transition ml-1">
                <i data-lucide="x" class="w-5 h-5 font-bold"></i>
            </button>
        </div>
    </header>

    <!-- AREA PRINCIPAL -->
    <div class="flex-1 relative flex overflow-hidden">
        
        <!-- STAGE DE LECTURA -->
        <main id="stage" class="flex-1 relative flex justify-center items-start overflow-hidden w-full">
            
            <!-- Botones Nav Flotantes (Desktop) -->
            <button onclick="changePage(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 z-40 w-12 h-12 rounded-full hidden md:flex items-center justify-center text-gray-400 hover:text-qbit-cyan bg-white/10 dark:bg-black/50 border border-gray-300 dark:border-gray-700 hover:shadow-[0_0_15px_rgba(6,182,212,0.4)] backdrop-blur-md transition-all duration-300 opacity-30 hover:opacity-100 group">
                <i data-lucide="chevron-left" class="w-8 h-8 group-hover:-translate-x-1 transition-transform"></i>
            </button>
            <button onclick="changePage(1)" class="absolute right-4 top-1/2 -translate-y-1/2 z-40 w-12 h-12 rounded-full hidden md:flex items-center justify-center text-gray-400 hover:text-qbit-cyan bg-white/10 dark:bg-black/50 border border-gray-300 dark:border-gray-700 hover:shadow-[0_0_15px_rgba(6,182,212,0.4)] backdrop-blur-md transition-all duration-300 opacity-30 hover:opacity-100 group">
                <i data-lucide="chevron-right" class="w-8 h-8 group-hover:translate-x-1 transition-transform"></i>
            </button>

            <!-- Contenedores -->
            <div id="pdf-render" class="hidden"><canvas id="the-canvas"></canvas></div>
            <div id="epub-render" class="hidden h-full w-full bg-transparent text-gray-800 dark:text-gray-200"></div>
            <iframe id="fallback-frame" class="w-full h-full hidden border-none bg-white"></iframe>
            
            <div id="empty-state" class="hidden absolute inset-0 flex flex-col items-center justify-center opacity-50">
                <div class="w-16 h-16 border-2 border-dashed border-gray-500 rounded-xl flex items-center justify-center mb-4">
                    <span class="text-2xl font-bold font-mono">?</span>
                </div>
                <p class="text-sm font-mono tracking-widest uppercase">No Document Loaded</p>
            </div>
        </main>

        <!-- PANEL LATERAL DE NOTAS -->
        <aside id="notes-sidebar">
            <div class="p-4 border-b border-slate-700 bg-[#020617] flex justify-between items-center shrink-0">
                <h2 class="text-qbit-yellow font-bold uppercase tracking-widest font-mono text-sm flex items-center gap-2">
                    <i data-lucide="bookmark" class="w-4 h-4"></i> Study Notes
                </h2>
                <button onclick="toggleNotes()" class="text-gray-400 hover:text-white transition p-1">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="bg-red-950/40 border-b border-red-900/50 p-3 shrink-0">
                <p class="text-[10px] text-red-400 leading-tight uppercase font-mono tracking-wide text-center">
                    <span class="font-bold block mb-0.5">⚠️ TEMPORARY SESSION</span>
                    Notes will be lost if you leave this page. Save as PDF before exiting.
                </p>
            </div>

            <div class="p-4 shrink-0 bg-slate-900/50">
                <textarea id="note-input" rows="3" class="w-full bg-black border border-slate-600 rounded-lg p-3 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-qbit-cyan resize-none font-sans transition-colors" placeholder="Write a note or summary here..."></textarea>
                <button onclick="addNote()" class="w-full mt-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white font-bold py-2 rounded-lg text-xs uppercase tracking-widest transition-colors flex justify-center items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Add Note
                </button>
            </div>

            <div class="flex-1 overflow-y-auto notes-list-scroll p-4 flex flex-col gap-3" id="notes-list">
                <div id="no-notes-msg" class="text-center text-slate-500 text-xs italic mt-10">
                    No notes recorded yet.
                </div>
            </div>

            <div class="p-4 border-t border-slate-700 bg-[#020617] shrink-0">
                <button onclick="exportNotesPDF()" id="btn-export-notes" class="w-full bg-qbit-yellow hover:bg-yellow-400 text-black font-bold py-3 rounded-lg text-sm uppercase tracking-widest shadow-[0_0_15px_rgba(250,204,21,0.2)] transition-all flex justify-center items-center gap-2">
                    <i data-lucide="printer" class="w-4 h-4"></i> Print / Save Notes
                </button>
            </div>
        </aside>

    </div>

    <!-- NAVEGACIÓN MÓVIL OPTIMIZADA (Footer) -->
    <footer class="md:hidden shrink-0 h-14 bg-[#020617] border-t border-gray-800 flex items-center justify-between px-2 sm:px-4 z-50">
        
        <!-- Botón Anterior -->
        <button onclick="changePage(-1)" class="p-2 text-gray-400 hover:text-white active:scale-95 transition flex items-center gap-1">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
            <span class="text-[10px] font-bold uppercase tracking-widest">Ant</span>
        </button>
        
        <!-- Zoom Integrado en Móvil -->
        <div class="flex items-center bg-gray-900 border border-gray-700 rounded-lg p-0.5 mx-2">
            <button onclick="zoom(-0.1)" class="w-8 h-8 flex items-center justify-center text-gray-400 active:bg-gray-800 rounded transition"><i data-lucide="minus" class="w-4 h-4"></i></button>
            <div class="w-px h-4 bg-gray-700 mx-0.5"></div>
            <button onclick="zoom(0.1)" class="w-8 h-8 flex items-center justify-center text-gray-400 active:bg-gray-800 rounded transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
        </div>
        
        <!-- Botón Siguiente -->
        <button onclick="changePage(1)" class="p-2 text-qbit-cyan hover:text-cyan-300 active:scale-95 transition flex items-center gap-1">
            <span class="text-[10px] font-bold uppercase tracking-widest">Sig</span>
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
    </footer>

    <script>
        lucide.createIcons();

        let currentScale = 1.0;
        let pdfDoc = null;
        let pageNum = 1;
        let epubRendition = null;
        let mode = 'none';
        let currentEpubSize = 100;
        let documentTitleForPrint = "Documento Sin Título";

        const themeToggleBtn = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        const pageInput = document.getElementById('page-input');
        const totalPagesEl = document.getElementById('total-pages');
        let bookId = 'doc_generico'; 

        // --- SISTEMA DE NOTAS ACADÉMICAS ---
        let notesArray = [];
        let isNotesOpen = false;

        function toggleNotes() {
            isNotesOpen = !isNotesOpen;
            const sidebar = document.getElementById('notes-sidebar');
            const btn = document.getElementById('btn-notes');
            
            if(isNotesOpen) {
                sidebar.classList.add('active');
                btn.classList.add('active');
                // Enfoque automático seguro para evitar scrolls raros en móviles
                setTimeout(() => {
                    const noteInput = document.getElementById('note-input');
                    noteInput.focus({preventScroll: true});
                }, 300);
            } else {
                sidebar.classList.remove('active');
                btn.classList.remove('active');
            }
        }

        function addNote() {
            const input = document.getElementById('note-input');
            const text = input.value.trim();
            if(!text) return;

            let ref = "General";
            if(mode === 'pdf') ref = `Pág. ${pageNum}`;
            else if(mode === 'epub') ref = `Ubicación ${pageInput.value}%`;

            const note = {
                id: Date.now(),
                text: text,
                reference: ref,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            notesArray.push(note);
            input.value = '';
            renderNotes();
            
            // Ocultar teclado en móvil tras guardar
            if(window.innerWidth < 640) input.blur();
        }

        function deleteNote(id) {
            notesArray = notesArray.filter(n => n.id !== id);
            renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            const msg = document.getElementById('no-notes-msg');
            
            Array.from(list.children).forEach(child => {
                if(child.id !== 'no-notes-msg') child.remove();
            });

            if(notesArray.length === 0) {
                msg.style.display = 'block';
                return;
            }
            
            msg.style.display = 'none';

            [...notesArray].reverse().forEach(note => {
                const card = document.createElement('div');
                card.className = "bg-slate-800 border border-slate-600 p-3 rounded-lg relative group shrink-0";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-mono text-qbit-cyan bg-cyan-900/30 px-1.5 py-0.5 rounded border border-cyan-800">${note.reference}</span>
                        <span class="text-[10px] text-slate-500">${note.time}</span>
                    </div>
                    <p class="text-sm text-gray-200 font-sans leading-relaxed whitespace-pre-wrap">${note.text}</p>
                    <button onclick="deleteNote(${note.id})" class="absolute top-2 right-2 text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                    </button>
                `;
                list.appendChild(card);
            });
        }

        function exportNotesPDF() {
            if(notesArray.length === 0) {
                // UI Feedback without alert()
                const btn = document.getElementById('btn-export-notes');
                const origHTML = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4"></i> Empty Notebook`;
                btn.classList.add('bg-red-500', 'text-white');
                btn.classList.remove('bg-qbit-yellow', 'text-black');
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = origHTML;
                    btn.classList.remove('bg-red-500', 'text-white');
                    btn.classList.add('bg-qbit-yellow', 'text-black');
                    lucide.createIcons();
                }, 2000);
                return;
            }

            let printContents = `
                <html>
                <head>
                    <title>Academic Notes - ${documentTitleForPrint}</title>
                    <style>
                        body { font-family: 'Arial', sans-serif; color: #000; padding: 40px; line-height: 1.6; }
                        .header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 30px; }
                        .title { font-size: 24px; font-weight: bold; margin: 0 0 10px 0; text-transform: uppercase;}
                        .subtitle { font-size: 14px; color: #555; }
                        .note-block { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; page-break-inside: avoid;}
                        .note-meta { font-size: 12px; color: #666; font-family: monospace; font-weight: bold; margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 5px;}
                        .note-text { font-size: 14px; white-space: pre-wrap;}
                        .footer { margin-top: 50px; font-size: 10px; color: #999; text-align: center; border-top: 1px solid #eee; padding-top: 10px;}
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="title">ACADEMIC NOTES REPORT</div>
                        <div class="subtitle">Document: ${documentTitleForPrint}</div>
                        <div class="subtitle">Export Date: ${new Date().toLocaleDateString()}</div>
                    </div>
            `;

            notesArray.forEach(note => {
                printContents += `
                    <div class="note-block">
                        <div class="note-meta">Ref: ${note.reference} | Time: ${note.time}</div>
                        <div class="note-text">${note.text}</div>
                    </div>
                `;
            });

            printContents += `
                    <div class="footer">Generated by ADELID / Q-BIT Reader System</div>
                </body>
                </html>
            `;

            const printWindow = window.open('', '_blank');
            printWindow.document.write(printContents);
            printWindow.document.close();
            
            setTimeout(() => { printWindow.print(); }, 250);
        }

        // --- STREAMING_CHUNK: Reader Controls ---
        let rulerActive = false;
        const rulerEl = document.getElementById('reading-ruler');
        const stageEl = document.getElementById('stage');

        function toggleRuler() {
            rulerActive = !rulerActive;
            const btn = document.getElementById('btn-ruler');
            if(rulerActive) {
                rulerEl.classList.remove('hidden');
                btn.classList.add('active');
                stageEl.style.cursor = 'crosshair';
            } else {
                rulerEl.classList.add('hidden');
                btn.classList.remove('active');
                stageEl.style.cursor = 'default';
            }
        }

        function updateRulerPos(clientY) {
            if(rulerActive) rulerEl.style.top = (clientY - 20) + 'px';
        }
        stageEl.addEventListener('mousemove', (e) => updateRulerPos(e.clientY));
        stageEl.addEventListener('touchstart', (e) => { if(e.touches.length > 0) updateRulerPos(e.touches[0].clientY); }, {passive: true});
        stageEl.addEventListener('touchmove', (e) => { if(e.touches.length > 0) updateRulerPos(e.touches[0].clientY); }, {passive: true});

        pageInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                let target = parseFloat(pageInput.value);
                if(mode === 'pdf' && pdfDoc) {
                    if(target >= 1 && target <= pdfDoc.numPages) {
                        pageNum = Math.floor(target);
                        renderPdfPage(pageNum);
                        pageInput.blur(); 
                    }
                } else if (mode === 'epub' && epubRendition) {
                    if(target >= 0 && target <= 100) {
                        let cfi = epubRendition.book.locations.cfiFromPercentage(target / 100);
                        epubRendition.display(cfi);
                        pageInput.blur();
                    }
                }
            }
        });

        function updatePageDisplay() {
            if(mode === 'pdf') {
                pageInput.value = pageNum;
                localStorage.setItem('qbit_prog_' + bookId, pageNum);
            }
        }

        function applyThemeToEpub() {
            if (!epubRendition) return;
            const isDark = htmlElement.classList.contains('dark');
            if (isDark) {
                epubRendition.themes.select("dark");
            } else {
                epubRendition.themes.select("light");
            }
        }

        if (localStorage.getItem('qbit_theme') === 'dark' || (!('qbit_theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
        }

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('qbit_theme', isDark ? 'dark' : 'light');
            applyThemeToEpub(); 
        });

        // --- STREAMING_CHUNK: Parsing & Loading ---
        window.onload = function() {
            setTimeout(hideLoader, 5000);

            const params = new URLSearchParams(window.location.search);
            const rawUrl = params.get('file') || params.get('libro');
            const title = params.get('title') || params.get('titulo');

            const titleEl = document.getElementById('title-display');
            if (title && titleEl) {
                titleEl.innerText = title;
                documentTitleForPrint = title;
            }
            
            if(rawUrl) bookId = btoa(rawUrl.split('/').pop()).substring(0, 15);

            if (rawUrl) {
                initReader(rawUrl);
            } else {
                hideLoader();
                document.getElementById('empty-state').classList.remove('hidden');
                document.getElementById('page-input').disabled = true;
            }
        };

        function hideLoader() {
            document.getElementById('loader').classList.add('hidden-loader');
        }

        function initReader(rawUrl) {
            let url = rawUrl;
            if (url.includes("wix:document://")) {
                const parts = url.split("/");
                if(parts.length >= 5) url = `https://docs.wixstatic.com/ugd/${parts[4]}`;
            }
            
            console.log("Sistema Inicializado:", url);
            let ext = 'pdf';
            try { ext = url.split('?')[0].split('.').pop().toLowerCase(); } catch(e){}

            if(ext === 'epub') loadEpub(url);
            else loadPdfPro(url);
        }

        async function loadPdfPro(url) {
            setMode('pdf');
            document.getElementById('status-msg').innerText = "PROCESANDO PDF...";
            
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                pdfDoc = await loadingTask.promise;
                hideLoader();
                
                document.getElementById('pdf-render').classList.remove('hidden');
                document.getElementById('pdf-render').classList.add('flex');
                
                if(totalPagesEl) totalPagesEl.innerText = pdfDoc.numPages;

                const savedPage = localStorage.getItem('qbit_prog_' + bookId);
                if(savedPage && parseInt(savedPage) <= pdfDoc.numPages) {
                    pageNum = parseInt(savedPage);
                }

                if (window.innerWidth < 640) currentScale = 0.7;
                else currentScale = 1.3;
                
                renderPdfPage(pageNum);
            } catch (error) {
                console.warn("Error PDF, iniciando protocolo de emergencia.", error);
                loadFallback(url);
            }
        }

        let isRendering = false;
        let pageRenderingQueue = null;

        function renderPdfPage(num) {
            if(isRendering) {
                pageRenderingQueue = num; 
                return;
            }
            isRendering = true;

            pdfDoc.getPage(num).then(page => {
                const canvas = document.getElementById('the-canvas');
                const ctx = canvas.getContext('2d');
                
                const outputScale = window.devicePixelRatio || 1;
                const viewport = page.getViewport({scale: currentScale});
                
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";
                
                const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

                const renderContext = {
                    canvasContext: ctx,
                    transform: transform,
                    viewport: viewport
                };

                page.render(renderContext).promise.then(() => {
                    isRendering = false;
                    updatePageDisplay();
                    if (pageRenderingQueue !== null) {
                        const np = pageRenderingQueue;
                        pageRenderingQueue = null;
                        renderPdfPage(np);
                    }
                });
            });
        }

        function loadEpub(url) {
            setMode('epub');
            document.getElementById('status-msg').innerText = "ABRIENDO EBOOK...";
            
            try {
                const book = ePub(url);
                epubRendition = book.renderTo("epub-render", { 
                    width: "100%", 
                    height: "100%", 
                    flow: "paginated",
                    manager: "continuous"
                });
                
                epubRendition.themes.register("light", { 
                    body: { "font-family": "Inter, sans-serif", "color": "#111", "background": "#f8fafc", "padding": "0 10px" },
                    p: { "font-size": "18px", "line-height": "1.6" }
                });
                
                epubRendition.themes.register("dark", { 
                    body: { "font-family": "Inter, sans-serif", "color": "#e2e8f0 !important", "background": "#0f172a !important", "padding": "0 10px" },
                    p: { "font-size": "18px", "line-height": "1.6", "color": "#e2e8f0 !important" },
                    h1: { "color": "#e2e8f0 !important" }, h2: { "color": "#e2e8f0 !important" }, h3: { "color": "#e2e8f0 !important" },
                    a: { "color": "#06b6d4 !important" }, span: { "color": "#e2e8f0 !important" }, div: { "color": "#e2e8f0 !important" }
                });

                book.ready.then(() => {
                    return book.locations.generate(1600);
                }).then(() => {
                    if(totalPagesEl) totalPagesEl.innerText = "%"; 
                }).catch(err => {
                    console.log("No se pudo generar paginación exacta");
                });

                hideLoader();
                document.getElementById('epub-render').classList.remove('hidden');
                
                const savedCfi = localStorage.getItem('qbit_prog_' + bookId);

                epubRendition.display(savedCfi || undefined).then(() => {
                    applyThemeToEpub(); 
                });

                epubRendition.on('relocated', function(location){
                    if(location.start.percentage !== undefined) {
                        let percent = Math.round(location.start.percentage * 100);
                        if(pageInput) pageInput.value = percent;
                        localStorage.setItem('qbit_prog_' + bookId, location.start.cfi);
                    }
                });

            } catch (e) {
                console.error(e);
                loadFallback(url);
            }
        }

        function loadFallback(url) {
            setMode('google');
            hideLoader();
            const iframe = document.getElementById('fallback-frame');
            iframe.classList.remove('hidden');
            iframe.src = `https://docs.google.com/gview?url=${encodeURIComponent(url)}&embedded=true`;
            if(totalPagesEl) totalPagesEl.innerText = "-";
            pageInput.disabled = true;
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('pdf-render').classList.add('hidden');
            document.getElementById('pdf-render').classList.remove('flex');
            document.getElementById('epub-render').classList.add('hidden');
            document.getElementById('fallback-frame').classList.add('hidden');
            
            const tag = document.getElementById('format-tag');
            if(tag) tag.innerText = newMode.toUpperCase();
        }

        function changePage(dir) {
            if(mode === 'pdf' && pdfDoc) {
                if(pageNum + dir >= 1 && pageNum + dir <= pdfDoc.numPages) {
                    pageNum += dir;
                    renderPdfPage(pageNum);
                    document.getElementById('pdf-render').scrollTop = 0;
                }
            } else if (mode === 'epub' && epubRendition) {
                dir > 0 ? epubRendition.next() : epubRendition.prev();
            }
        }

        function zoom(delta) {
            if(mode === 'pdf') {
                const newScale = currentScale + delta;
                if(newScale >= 0.4 && newScale <= 4.0) {
                    currentScale = newScale;
                    renderPdfPage(pageNum);
                }
            } else if (mode === 'epub' && epubRendition) {
                currentEpubSize += (delta * 100); 
                if(currentEpubSize < 60) currentEpubSize = 60;
                if(currentEpubSize > 250) currentEpubSize = 250;
                epubRendition.themes.fontSize(currentEpubSize + "%");
            }
        }

        function closeReader() {
            try { window.close(); } catch(e){}
            window.history.back();
        }

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT') return;
            if(e.key === 'ArrowRight') changePage(1);
            else if(e.key === 'ArrowLeft') changePage(-1);
        });

    </script>
</body>
</html>
